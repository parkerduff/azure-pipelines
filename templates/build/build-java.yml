# Central Java/Maven build template
# Maintained by: shared-ci-platform team
# Last reviewed: 2024-04

parameters:
  - name: jdkVersion
    type: string
    default: '17'
  - name: mavenGoal
    type: string
    default: 'package'
  - name: mavenOptions
    type: string
    default: '-B -DskipTests=false'
  - name: runTests
    type: boolean
    default: true
  - name: publishArtifacts
    type: boolean
    default: true
  - name: artifactName
    type: string
    default: 'java-dist'

steps:
  - task: JavaToolInstaller@0
    displayName: 'Install JDK ${{ parameters.jdkVersion }}'
    inputs:
      versionSpec: ${{ parameters.jdkVersion }}
      jdkArchitectureOption: 'x64'
      jdkSourceOption: 'PreInstalled'

  - task: Maven@4
    displayName: 'Maven ${{ parameters.mavenGoal }}'
    inputs:
      mavenPomFile: 'pom.xml'
      goals: ${{ parameters.mavenGoal }}
      options: ${{ parameters.mavenOptions }}
      publishJUnitResults: ${{ parameters.runTests }}
      testResultsFiles: '**/surefire-reports/TEST-*.xml'

  - ${{ if eq(parameters.publishArtifacts, true) }}:
    - script: |
        cp target/*.jar $(Build.ArtifactStagingDirectory)/ 2>/dev/null || true
        cp target/*.war $(Build.ArtifactStagingDirectory)/ 2>/dev/null || true
      displayName: 'Stage build artifacts'

    - task: PublishBuildArtifacts@1
      displayName: 'Upload artifacts'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)'
        artifactName: ${{ parameters.artifactName }}

    - script: |
        python $(Build.SourcesDirectory)/build-tools/scripts/publish_artifact.py \
          --name ${{ parameters.artifactName }} \
          --registry artifact-registry \
          --build-id $(Build.BuildId)
      displayName: 'Register artifact in artifact-registry'
