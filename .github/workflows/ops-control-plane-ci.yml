name: ops-control-plane-ci

on:
  push:
    branches:
      - main
    paths:
      - 'services/ops-control-plane/**'
  pull_request:
    branches:
      - main
    paths:
      - 'services/ops-control-plane/**'

env:
  GOPATH: ${{ github.workspace }}/go
  GOBIN: ${{ github.workspace }}/go/bin
  MODULE_PATH: services/ops-control-plane

jobs:
  build:
    name: 'Build ops-control-plane'
    runs-on: ubuntu-latest

    steps:
      # --- mapped from: checkout (implicit in ADO) ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- mapped from: GoTool@0 ---
      - name: Install Go 1.22
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      # --- mapped from: script (go mod download + verify) ---
      - name: Download modules
        working-directory: ${{ env.MODULE_PATH }}
        run: |
          go mod download
          go mod verify

      # --- mapped from: script (go vet) ---
      - name: Vet
        working-directory: ${{ env.MODULE_PATH }}
        run: go vet ./...

      # --- mapped from: script (go test) ---
      - name: Run tests
        working-directory: ${{ env.MODULE_PATH }}
        run: |
          go test ./... -v -coverprofile=coverage.out

      # --- mapped from: script (go build) ---
      - name: Build binary
        working-directory: ${{ env.MODULE_PATH }}
        run: |
          mkdir -p "${{ runner.temp }}/staging"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 \
            go build -ldflags="-s -w" -o "${{ runner.temp }}/staging/ops-control-plane" ./cmd/server

      # --- mapped from: PublishBuildArtifacts@1 ---
      - name: Publish binary
        uses: actions/upload-artifact@v4
        with:
          name: ops-control-plane-binary
          path: ${{ runner.temp }}/staging/ops-control-plane
