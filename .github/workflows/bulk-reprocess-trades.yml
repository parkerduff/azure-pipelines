name: bulk-reprocess-trades

on:
  workflow_dispatch:
    inputs:
      startDate:
        description: 'Start date for trade reprocessing (YYYY-MM-DD)'
        required: true
        default: '2024-01-01'
        type: string
      endDate:
        description: 'End date for trade reprocessing (YYYY-MM-DD)'
        required: true
        default: '2024-01-31'
        type: string
      tradeTypes:
        description: 'Trade types to reprocess (e.g., "all", "equity", "fx")'
        required: true
        default: 'all'
        type: string

jobs:
  reprocess-trades:
    name: 'Bulk reprocess trades'
    runs-on: ubuntu-latest
    timeout-minutes: 480

    env:
      # --- ADO variable shims (so helper scripts run unmodified) ---
      BUILD_SOURCEBRANCH: ${{ github.ref }}
      BUILD_SOURCEVERSION: ${{ github.sha }}
      BUILD_BUILDID: ${{ github.run_id }}
      BUILD_ARTIFACTSTAGINGDIRECTORY: ${{ runner.temp }}/staging
      BUILD_SOURCESDIRECTORY: ${{ github.workspace }}
      AGENT_NAME: ${{ runner.name }}
      AGENT_OS: ${{ runner.os }}
      BUILD_REQUESTEDFOR: ${{ github.actor }}
      BUILD_DEFINITIONNAME: ${{ github.workflow }}
      SYSTEM_TEAMFOUNDATIONCOLLECTIONURI: ${{ github.server_url }}/
      SYSTEM_TEAMPROJECT: ${{ github.repository }}
      PIPELINE_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

    steps:
      # --- mapped from: checkout (implicit in ADO) ---
      - uses: actions/checkout@v4

      # --- mapped from: UsePythonVersion@0 ---
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --- mapped from: script (Install dependencies) ---
      - name: Install dependencies
        run: pip install pandas requests pyarrow

      # --- mapped from: script (Reprocess trades) ---
      - name: Reprocess trades
        timeout-minutes: 420
        run: |
          mkdir -p "${{ runner.temp }}/staging/reprocessed"
          echo "Reprocessing trades from ${{ inputs.startDate }} to ${{ inputs.endDate }}"
          echo "Trade types: ${{ inputs.tradeTypes }}"
          python adhoc/scripts/reprocess_trades.py \
            --start-date "${{ inputs.startDate }}" \
            --end-date "${{ inputs.endDate }}" \
            --types "${{ inputs.tradeTypes }}" \
            --output "${{ runner.temp }}/staging/reprocessed/"

      # --- mapped from: PublishBuildArtifacts@1 ---
      - name: Archive reprocessed data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reprocessed-trades
          path: ${{ runner.temp }}/staging
