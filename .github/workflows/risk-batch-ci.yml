# =============================================================================
# risk-batch LEGACY CI Workflow (GitHub Actions)
# =============================================================================
#
# Migrated from: services/risk-batch/azure-pipelines-legacy.yml
# Stack: Python 3.9
# Original template source: templates/legacy/build-python-legacy.yml
#   (from legacy/master-support branch — frozen compatibility)
# Pool: vmImage ubuntu-20.04 (hosted, older image)
# Original trigger: none (triggered by downstream jobs)
# Single stage: Build only
#
# NOTE: This is a legacy pipeline still triggered by some downstream jobs.
#       Do not remove the original ADO pipeline yet.
#
# -----------------------------------------------------------------------------
# ADO Task → GitHub Actions Mapping
# -----------------------------------------------------------------------------
#
#   ADO Task / Step                        GitHub Actions Equivalent
#   ─────────────────────────────────────  ─────────────────────────────────────
#   UsePythonVersion@0                  →  actions/setup-python@v5
#   script: pip install -r req.txt      →  run: pip install -r requirements.txt
#   script: python -m unittest ...      →  run: python -m unittest ...
#   script: python setup.py sdist ...   →  run: python setup.py sdist bdist_wheel
#   PublishBuildArtifacts@1             →  actions/upload-artifact@v4
#
# -----------------------------------------------------------------------------
# ADO Variable → GitHub Actions Variable Mapping
# -----------------------------------------------------------------------------
#
#   ADO Variable                          GitHub Actions Equivalent
#   ─────────────────────────────────────  ─────────────────────────────────────
#   $(Build.ArtifactStagingDirectory)   →  ${{ runner.temp }}/staging
#   $(Build.SourcesDirectory)           →  ${{ github.workspace }}
#   $(Build.BuildId)                    →  ${{ github.run_id }}
#   $(Build.SourceBranch)               →  ${{ github.ref }}
#   $(Build.BuildNumber)                →  ${{ github.run_number }}
#
# -----------------------------------------------------------------------------
# Trigger Mapping
# -----------------------------------------------------------------------------
#
#   ADO: trigger: none (triggered by downstream jobs)
#   GH Actions: workflow_dispatch (manual/API trigger) — preserves the
#               "no automatic trigger" behavior while allowing downstream
#               jobs to invoke via GitHub API.
#   ADDED: on.pull_request — standard GH Actions practice for CI validation
#          on changes to this service's files.
#
# =============================================================================

name: risk-batch Legacy CI

on:
  # Preserves ADO "trigger: none" — can be invoked by downstream jobs via API
  workflow_dispatch:

  # ADDED: Standard GH Actions CI practice — validate PRs touching this service
  pull_request:
    paths:
      - 'services/risk-batch/**'

# ubuntu-20.04 matches the original ADO vmImage pool
# NOTE: Ubuntu 20.04 is EOL on GitHub Actions. When ready, migrate to
# ubuntu-22.04 or ubuntu-latest. Keeping 20.04 for now for parity.

jobs:
  legacy-build:
    name: Legacy Build
    runs-on: ubuntu-20.04

    steps:
      # -----------------------------------------------------------------------
      # Step 1: Checkout repository
      # ADDED: Required in GitHub Actions (ADO auto-checks-out the repo)
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Step 2: Setup Python 3.9
      # ADO: UsePythonVersion@0 with versionSpec: '3.9'
      # GH:  actions/setup-python@v5 with python-version: '3.9'
      # -----------------------------------------------------------------------
      - name: Use Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      # -----------------------------------------------------------------------
      # Step 3: Install dependencies
      # ADO: script: pip install --upgrade pip && pip install -r requirements.txt
      # GH:  run: (same commands)
      # -----------------------------------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # -----------------------------------------------------------------------
      # Step 4: Run tests (unittest)
      # ADO: script: python -m unittest discover -s tests -p "test_*.py" -v
      # GH:  run: (same command)
      # NOTE: Legacy template uses unittest, not pytest
      # -----------------------------------------------------------------------
      - name: Run tests (unittest)
        run: |
          python -m unittest discover -s tests -p "test_*.py" -v 2>&1 | tee test-output.txt

      # -----------------------------------------------------------------------
      # Step 5: Build package
      # ADO: script: python setup.py sdist bdist_wheel
      # GH:  run: (same command)
      # -----------------------------------------------------------------------
      - name: Build package
        run: |
          python setup.py sdist bdist_wheel

      # -----------------------------------------------------------------------
      # Step 6: Publish artifacts
      # ADO: PublishBuildArtifacts@1 with pathToPublish: 'dist/',
      #      artifactName: 'risk-batch-legacy'
      # GH:  actions/upload-artifact@v4
      # -----------------------------------------------------------------------
      - name: Publish artifacts
        uses: actions/upload-artifact@v4
        with:
          name: risk-batch-legacy
          path: dist/
