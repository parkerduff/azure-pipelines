# =============================================================================
# portfolio-api canary — GitHub Actions workflow
# =============================================================================
#
# Migrated from: services/portfolio-api/azure-pipelines-canary.yml
# Stack:         Java 17 / Maven
# Owner:         team-quant
# Template src:  central — templates/build/build-java.yml
#                (conditional branch selection via templateBranch parameter)
# Original branches: main, master, staging/preprod, staging/release-hardening
#
# Purpose:
#   Canary pipeline used by team-quant to test template changes on different
#   branches before committing to them. The ADO pipeline uses a runtime
#   parameter (templateBranch) to select which repository resource to pull
#   templates from. In GitHub Actions there is no equivalent of ADO repository
#   resources with per-ref template resolution, so the build steps are inlined
#   and the templateBranch input is preserved for traceability.
#
# ---------------------------------------------------------------------------
# ADO Task  ->  GitHub Actions Mapping
# ---------------------------------------------------------------------------
# JavaToolInstaller@0              ->  actions/setup-java@v4 (temurin)
# Maven@4                          ->  mvn command via shell
# PublishBuildArtifacts@1          ->  actions/upload-artifact@v4
# PublishTestResults@2 (implicit)  ->  dorny/test-reporter@v1
# publish_artifact.py              ->  preserved (run via shell with env: block)
#
# ---------------------------------------------------------------------------
# ADO Variable                     ->  GitHub Actions Equivalent
# ---------------------------------------------------------------------------
# $(Build.ArtifactStagingDirectory) -> ${{ runner.temp }}/staging
# $(Build.SourcesDirectory)         -> ${{ github.workspace }}
# $(Build.BuildId)                  -> ${{ github.run_id }}
# $(Build.SourceBranch)             -> ${{ github.ref }}
# $(Build.SourceVersion)            -> ${{ github.sha }}
# $(Build.BuildNumber)              -> ${{ github.run_number }}
# $(system.defaultWorkingDirectory) -> ${{ github.workspace }}
# parameters.templateBranch         -> inputs.templateBranch
#
# ---------------------------------------------------------------------------
# ADO Parameter                    ->  workflow_dispatch Input
# ---------------------------------------------------------------------------
# templateBranch (string, 4 vals)  ->  inputs.templateBranch (choice)
# =============================================================================

name: portfolio-api canary CI

# ADO trigger: none  ->  workflow_dispatch only (manual pipeline)
on:
  workflow_dispatch:
    inputs:
      templateBranch:
        description: >
          Template branch to use (mirrors ADO templateBranch parameter).
          In ADO this selected which repository resource to pull
          templates/build/build-java.yml from. Preserved here for
          traceability and downstream tooling.
        required: true
        type: choice
        default: main
        options:
          - main
          - master
          - staging/preprod
          - staging/release-hardening

env:
  ARTIFACT_NAME: portfolio-api-canary

jobs:
  # =========================================================================
  # Build  (maps to ADO Stage: Build)
  # =========================================================================
  build:
    name: "Build portfolio-api (canary - ${{ inputs.templateBranch }})"
    runs-on: ubuntu-latest

    steps:
      # -- Checkout ----------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -- JDK setup ---------------------------------------------------------
      # ADO: JavaToolInstaller@0  ->  actions/setup-java@v4
      - name: Install JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # -- Maven build -------------------------------------------------------
      # ADO: Maven@4 (goals: clean package, options: -B -DskipTests=false)
      - name: Maven clean package
        run: mvn clean package -B -DskipTests=false -f pom.xml

      # -- Publish test results ----------------------------------------------
      # ADO: Maven@4 publishJUnitResults: true  ->  dorny/test-reporter@v1
      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Maven Test Results
          path: '**/surefire-reports/TEST-*.xml'
          reporter: java-junit

      # -- Stage build artifacts ---------------------------------------------
      # ADO: script cp target/*.jar / *.war to ArtifactStagingDirectory
      - name: Create staging directory
        run: mkdir -p "${{ runner.temp }}/staging"

      - name: Stage build artifacts
        run: |
          cp target/*.jar "${{ runner.temp }}/staging/" 2>/dev/null || true
          cp target/*.war "${{ runner.temp }}/staging/" 2>/dev/null || true

      # -- Upload artifacts --------------------------------------------------
      # ADO: PublishBuildArtifacts@1  ->  actions/upload-artifact@v4
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ runner.temp }}/staging/

      # -- Register artifact in Artifactory ----------------------------------
      # ADO: script invoking build-tools/scripts/publish_artifact.py
      # Env vars mapped from ADO equivalents (see publish_artifact.py source)
      - name: Register artifact in Artifactory
        run: |
          python build-tools/scripts/publish_artifact.py \
            --name "${{ env.ARTIFACT_NAME }}" \
            --registry Artifactory \
            --build-id "${{ github.run_id }}"
        env:
          BUILD_SOURCEBRANCH: ${{ github.ref }}
          BUILD_SOURCEVERSION: ${{ github.sha }}
          AGENT_NAME: github-actions
          BUILD_ARTIFACTSTAGINGDIRECTORY: ${{ runner.temp }}/staging
