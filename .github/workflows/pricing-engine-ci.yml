---
# pricing-engine CI workflow
# Migrated from: services/pricing-engine/azure-pipelines.yml
# Stack: .NET 8
# Original template source: central templates (main branch)
#
# ADO-to-GitHub Actions Mapping:
#   ADO Template                                    -> GitHub Actions Equivalent
#   -----------------------------------------------    -----------------------------------------------
#   templates/build/build-dotnet.yml@templates      -> Inline steps using actions/setup-dotnet
#     - UseDotNet@2                                 -> actions/setup-dotnet@v4
#     - NuGetToolInstaller@1                        -> (bundled with dotnet CLI — nuget restore via dotnet)
#     - NuGetCommand@2 (restore)                    -> dotnet restore
#     - DotNetCoreCLI@2 (build)                     -> dotnet build
#     - DotNetCoreCLI@2 (test)                      -> dotnet test
#     - DotNetCoreCLI@2 (publish)                   -> dotnet publish
#     - PublishBuildArtifacts@1                      -> actions/upload-artifact@v4
#     - publish_artifact.py                         -> build-tools/scripts/publish_artifact.py
#
#   templates/test/run-tests.yml@templates          -> Inline steps (generic framework => dotnet test already in build)
#     - PublishTestResults@2                         -> dorny/test-reporter@v1
#       (or EnricoMi/publish-unit-test-result-action)
#     - normalize_test_results.py                   -> build-tools/scripts/normalize_test_results.py
#
#   templates/release/release-standard.yml@templates -> GitHub environment + deployment job
#     - deployment job                              -> job with environment protection rules
#     - download: current                           -> actions/download-artifact@v4
#     - notify_release_orchestrator.py              -> build-tools/scripts/notify_release_orchestrator.py
#     - generate_attestation.py                     -> build-tools/scripts/generate_attestation.py
#
# Variable Syntax Mapping:
#   $(Build.ArtifactStagingDirectory) -> ${{ runner.temp }}/staging
#   $(Build.SourcesDirectory)         -> ${{ github.workspace }}
#   $(Build.BuildId)                  -> ${{ github.run_id }}
#   $(Build.SourceBranch)             -> ${{ github.ref }}
#   $(buildConfiguration)             -> env.BUILD_CONFIGURATION
#   $(artifactName)                   -> env.ARTIFACT_NAME

name: pricing-engine CI

on:
  push:
    branches:
      - main
      - 'release/*'
    paths:
      - 'services/pricing-engine/**'
  pull_request:
    branches:
      - main
    paths:
      - 'services/pricing-engine/**'

env:
  BUILD_CONFIGURATION: Release
  ARTIFACT_NAME: pricing-engine-drop
  DOTNET_VERSION: '8.0.x'

jobs:
  # --------------------------------------------------------------------------
  # Stage: Build (maps to ADO stage "Build" + templates/build/build-dotnet.yml)
  # --------------------------------------------------------------------------
  build:
    name: Build pricing-engine
    runs-on: ubuntu-latest

    steps:
      # --- Checkout ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Install .NET SDK (maps to UseDotNet@2) ---
      - name: Install .NET SDK ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # --- Restore NuGet packages (maps to NuGetToolInstaller@1 + NuGetCommand@2) ---
      # The dotnet CLI includes built-in NuGet support, so no separate NuGet
      # installer is needed. `dotnet restore` replaces both ADO tasks.
      - name: Restore NuGet packages
        run: dotnet restore services/pricing-engine/**/*.sln

      # --- Build solution (maps to DotNetCoreCLI@2 command=build) ---
      - name: Build solution
        run: |
          dotnet build services/pricing-engine/**/*.sln \
            --configuration ${{ env.BUILD_CONFIGURATION }} \
            --no-restore

      # --- Run unit tests (maps to DotNetCoreCLI@2 command=test from build-dotnet.yml) ---
      - name: Run unit tests
        run: |
          dotnet test services/pricing-engine/**/*Tests/*.csproj \
            --configuration ${{ env.BUILD_CONFIGURATION }} \
            --collect:"XPlat Code Coverage" \
            --results-directory ${{ runner.temp }}/test-results \
            --logger "trx;LogFileName=results.trx"

      # --- Publish artifacts (maps to DotNetCoreCLI@2 command=publish) ---
      - name: Publish application
        run: |
          dotnet publish services/pricing-engine/**/*.sln \
            --configuration ${{ env.BUILD_CONFIGURATION }} \
            --output ${{ runner.temp }}/staging

      # --- Upload build artifacts (maps to PublishBuildArtifacts@1) ---
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ runner.temp }}/staging

      # --- Register artifact in artifact-registry (maps to publish_artifact.py) ---
      - name: Register artifact in artifact-registry
        run: |
          python build-tools/scripts/publish_artifact.py \
            --name "${{ env.ARTIFACT_NAME }}" \
            --registry artifact-registry \
            --build-id "${{ github.run_id }}"

  # --------------------------------------------------------------------------
  # Stage: Test (maps to ADO stage "Test" + templates/test/run-tests.yml)
  # The ADO pipeline calls run-tests.yml with testFramework='generic'.
  # For .NET, the primary tests already ran in the build job above via
  # build-dotnet.yml (runTests=true). This stage adds result normalization
  # and test-result publishing as a separate job, matching the ADO structure.
  # --------------------------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install .NET SDK ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # --- Create test results directory (maps to mkdir step in run-tests.yml) ---
      - name: Create test results directory
        run: mkdir -p ${{ runner.temp }}/test-results

      # --- Run tests and produce JUnit XML (generic framework) ---
      - name: Run tests
        run: |
          dotnet test services/pricing-engine/**/*Tests/*.csproj \
            --configuration ${{ env.BUILD_CONFIGURATION }} \
            --logger "junit;LogFileName=${{ runner.temp }}/test-results/results.xml"

      # --- Publish test results (maps to PublishTestResults@2) ---
      - name: Publish test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: ${{ runner.temp }}/test-results/**/*.xml
          reporter: java-junit
          fail-on-error: true

      # --- Normalize test results (maps to normalize_test_results.py) ---
      - name: Normalize test results
        if: always()
        run: |
          python build-tools/scripts/normalize_test_results.py \
            --input-dir "${{ runner.temp }}/test-results" \
            --output "${{ runner.temp }}/normalized-results.json"

  # --------------------------------------------------------------------------
  # Stage: Deploy to dev (maps to ADO stage "Deploy_Dev" +
  #        templates/release/release-standard.yml)
  #
  # ADO condition: only on main branch pushes.
  # GH Actions equivalent: conditional job with environment protection.
  # --------------------------------------------------------------------------
  deploy-dev:
    name: Deploy to dev
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # Maps to ADO `environment: dev` — use GitHub Environments for
    # protection rules and deployment tracking.
    environment:
      name: dev

    steps:
      # --- Download artifact (maps to `download: current`) ---
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ runner.temp }}/deploy

      - name: Checkout repository
        uses: actions/checkout@v4

      # --- Execute deployment (maps to deploy script in release-standard.yml) ---
      - name: Execute deployment
        run: |
          echo "Deploying ${{ env.ARTIFACT_NAME }} to dev"
          echo "Strategy: rolling"

      # --- Notify release-orchestrator (maps to notify_release_orchestrator.py) ---
      - name: Notify release-orchestrator
        run: |
          python build-tools/scripts/notify_release_orchestrator.py \
            --service "${{ env.ARTIFACT_NAME }}" \
            --env dev \
            --build-id "${{ github.run_id }}" \
            --status success

      # --- Generate compliance attestation (maps to generate_attestation.py) ---
      - name: Generate compliance attestation
        run: |
          python build-tools/scripts/generate_attestation.py \
            --artifact "${{ env.ARTIFACT_NAME }}" \
            --env dev \
            --build-id "${{ github.run_id }}"
