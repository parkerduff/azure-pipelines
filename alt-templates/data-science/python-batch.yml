# Python batch job template for data science
# Created by: team-quant
# Used for scheduled batch processing jobs

parameters:
  - name: pythonVersion
    type: string
    default: '3.10'
  - name: scriptPath
    type: string
  - name: arguments
    type: string
    default: ''
  - name: timeoutMinutes
    type: number
    default: 120
  - name: retryCount
    type: number
    default: 2

steps:
  - task: UsePythonVersion@0
    displayName: 'Use Python ${{ parameters.pythonVersion }}'
    inputs:
      versionSpec: ${{ parameters.pythonVersion }}

  - script: |
      pip install -r requirements.txt
    displayName: 'Install dependencies'

  - script: |
      set -e
      RETRY=0
      MAX_RETRY=${{ parameters.retryCount }}
      until python ${{ parameters.scriptPath }} ${{ parameters.arguments }}; do
        RETRY=$((RETRY + 1))
        if [ $RETRY -ge $MAX_RETRY ]; then
          echo "Failed after $MAX_RETRY retries"
          exit 1
        fi
        echo "Retry $RETRY of $MAX_RETRY..."
        sleep 30
      done
    displayName: 'Execute batch script with retry'
    timeoutInMinutes: ${{ parameters.timeoutMinutes }}
